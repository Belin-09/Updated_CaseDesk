<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseDesk — Case Detail</title>
  <link rel="stylesheet" href="assets/style.css?v=2.5">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-left">
      <div class="navbar-logo">CaseDesk</div>
      <div class="navbar-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="cases.html" class="active">Cases</a>
        <a href="search.html">Search</a>
        <a href="review.html">Review Queue</a>
      </div>
    </div>
    <div class="navbar-right">
      <span class="navbar-user">Logged in as <span id="navUsername"></span></span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <a href="cases.html" class="back-link">← Back to Cases</a>

    <div class="page-header">
      <div>
        <div class="page-title" id="caseTitle">Loading...</div>
        <div class="page-subtitle" id="caseSubtitle"></div>
      </div>
      <div style="display:flex; gap:10px; align-items: center;">
        <button class="btn-secondary" id="reprocessBtn">🔄 Reprocess Fields</button>
      </div>
    </div>

    <div class="detail-layout">
      <!-- Left column -->
      <div>
        <div class="detail-card">
          <h3>Case Fields</h3>
          
          <div class="field-row">
            <div class="field-group">
              <label>Analyst</label>
              <input type="text" id="f_analyst">
            </div>
            <div class="field-group">
              <label>Investigating Officer</label>
              <input type="text" id="f_investigating_officer">
            </div>
          </div>
          
          <h4 style="margin: 20px 0 10px 0; color: #4f9cff; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a3441; padding-bottom: 6px;">Case Pertains to</h4>
          <div class="field-row" style="grid-template-columns: repeat(3, 1fr);">
            <div class="field-group">
              <label>Service No</label>
              <input type="text" id="f_pertains_service_no">
            </div>
            <div class="field-group">
              <label>Name</label>
              <input type="text" id="f_pertains_name">
            </div>
            <div class="field-group">
              <label>Unit</label>
              <input type="text" id="f_pertains_unit">
            </div>
          </div>
          
          <h4 style="margin: 20px 0 10px 0; color: #4f9cff; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a3441; padding-bottom: 6px;">Dates</h4>
          <div class="field-row" style="grid-template-columns: repeat(4, 1fr);">
            <div class="field-group">
              <label>Deposition Date</label>
              <input type="text" id="f_date_deposition">
            </div>
            <div class="field-group">
              <label>Hash Letter Issuance</label>
              <input type="text" id="f_date_issuance">
            </div>
            <div class="field-group">
              <label>Intimation Date</label>
              <input type="text" id="f_date_intimation">
            </div>
            <div class="field-group">
              <label>Return Date</label>
              <input type="text" id="f_date_return">
            </div>
          </div>

          <div class="field-row" style="margin-top: 15px;">
            <div class="field-group" style="max-width: 250px;">
              <label>Status</label>
              <select id="f_status">
                <option value="open">Open</option>
                <option value="pending">Pending</option>
                <option value="closed">Closed</option>
              </select>
            </div>
          </div>
        </div>

        <div class="detail-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px;">
            <h3 style="margin: 0;">Document Preview</h3>
            <div class="search-box-container" style="display: flex; gap: 8px; align-items: center; width: 300px; max-width: 100%;">
              <input type="text" id="caseSearchInput" placeholder="Search text in documents..." style="flex: 1; padding: 6px 12px; border-radius: 4px; border: 1px solid #2a3441; background: #0f1419; color: #e8eaed; font-size: 13px; outline: none; transition: border-color 0.15s ease;" onfocus="this.style.borderColor='#4f9cff'" onblur="this.style.borderColor='#2a3441'">
              <button class="btn-primary" id="caseSearchBtn" style="padding: 6px 12px; font-size: 13px; border-radius: 4px;">Search</button>
            </div>
          </div>
          <div id="documentPreviewContainer" style="margin-top: 10px;">Loading preview...</div>
          <div class="raw-text-box" id="rawTextBox" style="display: none; margin-top: 10px;">—</div>
        </div>

        <div class="detail-card">
          <h3>Source Files</h3>
          <div id="fileList"></div>
        </div>

        <div class="save-bar">
          <span class="save-status" id="saveStatus"></span>
          <button class="btn-primary" id="saveBtn">Save Changes</button>
        </div>
      </div>

      <!-- Right sidebar -->
      <div>
        <div class="detail-card">
          <h3>Metadata</h3>

          <div class="meta-row"><span>Uploaded By</span><span id="m_uploaded_by"></span></div>
          <div class="meta-row"><span>Created</span><span id="m_created_at"></span></div>
          <div class="meta-row"><span>Last Updated</span><span id="m_updated_at"></span></div>
          <div class="meta-row"><span>Error Flag</span><span id="m_error_flag"></span></div>
          <div class="meta-row"><span>Error Reason</span><span id="m_error_reason"></span></div>
        </div>

        <div class="detail-card">
          <h3>Actions</h3>
          <div class="sidebar-actions">
            <button class="btn-primary" id="exportBtn">📄 Export PDF</button>
            <button class="btn-danger" id="deleteBtn">Delete Case</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/auth-guard.js"></script>
  <script src="assets/case-detail.js?v=2.5"></script>
</body>
</html>
