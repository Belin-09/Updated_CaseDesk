<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseDesk — Review Queue</title>
  <link rel="stylesheet" href="assets/style.css?v=2.5">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-left">
      <div class="navbar-logo">CaseDesk</div>
      <div class="navbar-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="cases.html">Cases</a>
        <a href="search.html">Search</a>
        <a href="review.html" class="active">Review Queue</a>
      </div>
    </div>
    <div class="navbar-right">
      <span class="navbar-user">Logged in as <span id="navUsername"></span></span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <div>
        <div class="page-title">Manual Review Queue</div>
        <div class="page-subtitle" id="reviewCount">Loading...</div>
      </div>
      <select id="reasonFilter" style="background:#0f1419; border:1px solid #2a3441; color:#e8eaed; padding:8px 30px 8px 12px; border-radius:6px; font-size:13px; outline:none; cursor:pointer; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=\'%238a93a3\' height=\'24\' viewBox=\'0 0 24 24\' width=\'24\' xmlns=\'http://www.w3.org/2000/svg\'><path d=\'M7 10l5 5 5-5z\'/></svg>'); background-repeat: no-repeat; background-position: right 4px center;">
        <option value="">All Reasons</option>
        <option value="EMPTY_TEXT">Empty Text</option>
        <option value="LOW_FIELDS">Low Fields</option>
        <option value="LOW_OCR_CONFIDENCE">Low OCR Confidence</option>
        <option value="EXTRACTION_EXCEPTION">Extraction Exception</option>
        <option value="ESCALATED">Escalated</option>
      </select>
    </div>

    <div class="review-layout">
      <!-- Left: list of flagged cases -->
      <div>
        <div id="reviewList"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-state-icon">✅</div>
          <div>No flagged cases — queue is clear</div>
        </div>
      </div>

      <!-- Right: detail panel -->
      <div class="review-detail-panel empty" id="reviewDetail">
        Select a case from the list to review
      </div>
    </div>
  </div>

  <script src="assets/auth-guard.js"></script>
  <script src="assets/review.js?v=1.7"></script>
</body>
</html>
